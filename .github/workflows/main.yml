name: GitHub个人资料统计生成

on:
  push:
    branches:
      - main
    paths-ignore:
      - github-metrics.svg
  schedule:
    # 每天 12:17 UTC 运行，对应北京时间 20:17
    - cron: "17 12 * * *"
  workflow_dispatch:

concurrency:
  group: github-metrics
  cancel-in-progress: true

jobs:
  github-metrics:
    name: 生成 GitHub / WakaTime 统计图
    runs-on: ubuntu-latest
    steps:
      - name: 生成更聚焦的 WakaTime 统计信息
        uses: lowlighter/metrics@latest
        with:
          # 认证与设置
          token: ${{ secrets.GH_TOKEN }}
          committer_token: ${{ secrets.GH_TOKEN }}
          user: Muxucao0812
          config_timezone: Asia/Shanghai

          # 只保留统计卡片本体，让画面聚焦在编码数据
          base: ""

          # 版式配置
          template: classic
          config_display: large
          config_order: wakatime, habits, isocalendar
          config_padding: 5%

          # 日历统计（显示半年）
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 编码习惯（启用更顺滑的图表样式）
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_days: 21
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 6
          plugin_habits_languages_threshold: 2%

          # WakaTime 统计（增加项目/语言图表，减少重复信息）
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 30
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_limit: 6
          plugin_wakatime_languages_other: yes
          plugin_wakatime_url: https://wakatime.com

          # 输出文件设置
          output_action: commit
          committer_branch: main
          committer_message: "📊 更新个人 GitHub 统计信息 [skip ci]"
